title = "morning-brief-enrichment worktree floor config"

# Inherit the full gitleaks default ruleset — this is NOT a weakening of the
# secret scan. It adds exactly ONE scoped allowlist entry for a VERIFIED false
# positive so the deterministic floor can go green on a genuinely clean tree.
[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Verified false positive (generic-api-key, entropy 4.11):
#   tests/fixtures/render_input_2026-07-03.json
#     "event_key": "ai-news-july-3-2026-15-biggest-stories"
#
# The morning-digest producer names every brief item's slug field `event_key`.
# gitleaks' generic-api-key rule keys off the trailing `key` token before the
# quoted value and flags this one slug because it happens to contain no
# dictionary stopword (its sibling slugs do, so they are not flagged). It is a
# public, already-posted news headline slug from a REAL captured production
# sample (PRD §0, Appendix) — not a credential. The fixture bytes are
# load-bearing (the reality tests diff the real captured sample) and must stay
# byte-real, so the finding is suppressed here, scoped to this exact path and
# rule, rather than by mutating a real production artifact.
# ---------------------------------------------------------------------------
[[allowlists]]
description = "brief_delta captured fixtures: event_key news slugs are public headlines, not secrets"
targetRules = ["generic-api-key"]
paths = ['''tests/fixtures/render_input_.*\.json''']
